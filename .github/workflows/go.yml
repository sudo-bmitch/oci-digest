name: Go

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ '**' ]

permissions:
  contents: read

jobs:

  build:
    name: Test and Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gover: ['go.mod', 'oldstable', 'stable']

    env:
      # do not automatically upgrade go to a different version: https://go.dev/doc/toolchain
      GOTOOLCHAIN: "local"

    steps:
    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: "Set up Go ${{ matrix.gover }}"
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.gover != 'go.mod' && matrix.gover || null }}
        go-version-file: ${{ matrix.gover == 'go.mod' && 'go.mod' || null }}
        check-latest: true
      id: go

    - name: Verify go fmt
      run: test -z "$(go fmt ./...)"

    - name: Verify go vet
      run: test -z "$(go vet ./...)"

    - name: Test
      run: make test

    - name: Linting
      if: matrix.gover == 'stable'
      run: make lint
